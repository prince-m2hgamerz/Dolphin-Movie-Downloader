<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViBEX SERVER</title>
    <style>
      @import url("https://cdn.jsdelivr.net/npm/geist-font@1.3.1/style.css");

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(600px 260px at 50% -15%, #1a1a1a 0%, transparent 70%),
          #000;
        color: #f5f5f5;
        font-family: "Geist Sans", "Geist", "Segoe UI", sans-serif;
        overflow: hidden;
        border-radius: 10px;
        user-select: none;
        cursor: default;
        border: 1px solid #2b2b30;
        -webkit-app-region: drag;
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(circle at center, black 20%, transparent 84%);
        opacity: 0.35;
        pointer-events: none;
      }

      .logo {
        width: 86px;
        height: 86px;
        border-radius: 22px;
        border: 1px solid #fff;
        background: #fff;
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
        animation: float 2.2s ease-in-out infinite;
        z-index: 1;
      }

      .logo i {
        font-size: 34px;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      h2 {
        margin: 16px 0 6px;
        font-size: 27px;
        letter-spacing: 0.08em;
        z-index: 1;
      }

      #status {
        margin: 0;
        color: #a1a1aa;
        font-size: 12px;
        letter-spacing: 0.04em;
        z-index: 1;
      }

      .footer {
        position: absolute;
        bottom: 14px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
      }

      .version {
        color: #8f8f98;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .credit {
        color: #b8b8bf;
        opacity: 0.9;
        font-size: 10px;
        letter-spacing: 0.08em;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="logo">
      <i class="fas fa-server"></i>
    </div>

    <h2>ViBEX SERVER</h2>
    <p id="status">Initializing...</p>

    <div class="footer">
      <span class="version" id="version">v1.1.3</span>
      <span class="credit">Powered by ViBEX</span>
    </div>

    <script>
      const { ipcRenderer } = require("electron");
      const statusElement = document.getElementById("status");
      const versionElement = document.getElementById("version");

      ipcRenderer.on("update-status", (event, message) => {
        statusElement.innerText = message;
      });

      ipcRenderer.on("app-version", (event, version) => {
        versionElement.innerText = `v${version}`;
      });
    </script>
  </body>
</html>
