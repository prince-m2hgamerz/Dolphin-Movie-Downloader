<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViBEX SERVER</title>
    <link rel="icon" type="image/x-icon" href="/icon.ico" />
    <link rel="stylesheet" href="/src/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-wrap">
          <div class="brand-mark">
            <i class="fas fa-bolt"></i>
          </div>
          <div class="brand-copy">
            <p class="eyebrow">ViBEX SERVER</p>
            <h1>Movie Downloader</h1>
          </div>
        </div>

        <div class="topbar-side">
          <p class="status-pill"><span class="status-dot"></span>Server Online</p>
          <button class="toggle-downloads-btn" onclick="toggleSidebar()">
            <i class="fas fa-download"></i> Downloads
            <span id="activeCount" class="badge" style="display: none">0</span>
          </button>
        </div>
      </header>

      <section class="search-panel">
        <div class="search-box">
          <i class="fas fa-search search-icon"></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Search movies instantly (example: Spider-Man 1080p)"
            onkeypress="handleEnter(event)"
          />

          <button id="searchBtn" onclick="search()" class="primary-btn">
            Search
          </button>
          <button
            id="cancelSearchBtn"
            onclick="cancelSearch()"
            class="cancel-btn"
            style="display: none"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>

        <div class="filter-bar">
          <div class="filter-group">
            <label>Quality</label>
            <select id="qualityFilter" onchange="applyFilters()">
              <option value="all">Any</option>
              <option value="2160p">4K / 2160p</option>
              <option value="1080p">1080p</option>
              <option value="720p">720p</option>
            </select>
          </div>

          <div class="filter-group">
            <label>Sort</label>
            <select id="sortFilter" onchange="applyFilters()">
              <option value="seeds_desc">Seeds: High -> Low</option>
              <option value="seeds_asc">Seeds: Low -> High</option>
              <option value="size_desc">Size: Big -> Small</option>
            </select>
          </div>

          <span id="resultCount" class="filter-stats"></span>
        </div>
      </section>

      <div class="results-container">
        <table id="resultsTable">
          <thead>
            <tr>
              <th width="50%">Title</th>
              <th width="15%">Size</th>
              <th width="15%">Seeds</th>
              <th width="20%">Action</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>

        <div id="loadMoreContainer" class="load-more-container" style="display: none">
          <button onclick="loadMore()" class="secondary-btn">
            Load More Results
          </button>
        </div>
      </div>

      <div id="emptyState">
        <i class="fas fa-film"></i>
        <p>Ready to search</p>
      </div>

      <footer class="app-footer" id="footer">
        <p class="footer-copy">ViBEX SERVER</p>
        <p class="footer-meta">Secure EC2 Download API</p>
      </footer>
    </main>

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside id="downloadSidebar" class="sidebar">
      <div class="sidebar-head">
        <h2>Downloads</h2>
        <button class="close-sidebar-btn" onclick="toggleSidebar()">
          &times;
        </button>
      </div>

      <div class="sidebar-settings">
        <label class="path-label">Server Download Path</label>
        <div class="path-row path-row-locked">
          <input type="text" id="pathDisplay" readonly />
          <span class="path-lock" title="Locked by server policy">
            <i class="fas fa-lock"></i>
          </span>
        </div>
        <p class="path-hint">Path is managed on server and not exposed to users.</p>
      </div>

      <div id="downloadList" class="download-list"></div>
    </aside>

    <script src="/src/web-api.js"></script>
    <script src="/src/renderer.js"></script>
  </body>
</html>
